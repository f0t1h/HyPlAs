name: hyplas-env
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python>=3.10,<3.13
  - pip
  - biopython

  # Read QC / trimming
  - fastp>=0.23
  - chopper>=0.9
  - pigz
  - multiqc>=1.14
  - nanoplot>=1.42
  - quast>=5.2

  # HyPlAs top-level runtime tools
  - spades>=4,<5
  - minigraph>=0.21
  - minimap2>=2.28
  - racon>=1.5.0
  - platon=1.7

  # Unicycler subtools used by the pipeline
  - blast>=2.12.0

  # Platon subtools (explicit for containers)
  - prodigal>=2.6.3
  - diamond>=2.0.14
  - hmmer>=3.3.1
  - infernal>=1.1.2
  - mummer4>=4.0.1

  # Build + utility tools
  - cxx-compiler
  - make
  - zlib
  - gzip

  # Python-only dependency used by HyPlAs pipeline
  - pip:
      - unicycler_hyplas_modified==0.5.1
